<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a14" />
    <meta name="description" content="Avishake Adhikary — interactive OS-style portfolio." />
    <title>Avishake OS — Portfolio</title>
    <style>
      html, body, #app {
        height: 100%;
        margin: 0;
        padding: 0;
        background: #05060c;
        color: #fff;
        font-family: 'Segoe UI Variable', 'Segoe UI', system-ui, -apple-system, sans-serif;
        overflow: hidden;
      }
      .boot-fallback {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at 50% 50%, #0a0e1f 0%, #03030a 100%);
        color: #e6e8ff;
        font-size: 13px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        text-align: center;
      }
      .boot-fallback .ring {
        width: 56px;
        height: 56px;
        border-radius: 50%;
        border: 2px solid rgba(255, 255, 255, 0.1);
        border-top-color: #6c8cff;
        animation: spin 1s linear infinite;
        margin: 0 auto 18px;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="boot-fallback">
        <div>
          <div class="ring"></div>
          Starting&nbsp;Avishake&nbsp;OS
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
